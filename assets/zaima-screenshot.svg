<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="560" viewBox="0 0 1120 560" role="img" aria-labelledby="title desc">
  <title id="title">zaima terminal screenshot</title>
  <desc id="desc">A terminal window showing zaima checking AI CLI login status and versions.</desc>
  <rect width="1120" height="560" fill="#10161c"/>
  <rect x="24" y="24" width="1072" height="512" rx="14" fill="#151c24" stroke="#334250" stroke-width="2"/>
  <circle cx="58" cy="56" r="8" fill="#e15d4f"/>
  <circle cx="86" cy="56" r="8" fill="#e5bb4f"/>
  <circle cx="114" cy="56" r="8" fill="#4fb26d"/>
  <text x="560" y="62" text-anchor="middle" fill="#aebcca" font-family="Arial, sans-serif" font-size="18">zaima</text>
  <g font-family="Consolas, 'Liberation Mono', monospace" font-size="25">
    <text x="82" y="126" fill="#9bbcff">+----------------------------------------------------------------------------+</text>
    <text x="82" y="170" fill="#eef7ff">| ZAIMA Dashboard                                                            |</text>
    <text x="82" y="214" fill="#b8c7d8">| AI CLI login + version monitor | assistants: 4 | timeout: 20s             |</text>
    <text x="82" y="258" fill="#9bbcff">+----------------------------------------------------------------------------+</text>
    <text x="82" y="302" fill="#eef7ff">| assistant              | login  | version                                  |</text>
    <text x="82" y="346" fill="#9bbcff">+----------------------------------------------------------------------------+</text>
    <text x="82" y="390" fill="#8fe0b8">| [COD] codex        | OK     | codex-cli 0.125.0                        |</text>
    <text x="82" y="430" fill="#f0a7ff">| [CLA] claude-code  | OK     | 2.1.112 (Claude Code)                    |</text>
    <text x="82" y="470" fill="#9bbcff">| [GEM] gemini       | OK     | 0.39.0                                   |</text>
    <text x="82" y="510" fill="#f1cf78">| [HER] hermes-agent | OK     | Hermes Agent v0.10.0 (2026.4.16)         |</text>
  </g>
</svg>
