<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="640" viewBox="0 0 1120 640" role="img" aria-labelledby="title desc">
  <title id="title">4d4y_cli terminal screenshot</title>
  <desc id="desc">A terminal window showing the 4D4Y Forum CLI main menu.</desc>
  <rect width="1120" height="640" fill="#111917"/>
  <rect x="24" y="24" width="1072" height="592" rx="14" fill="#17201d" stroke="#31453c" stroke-width="2"/>
  <circle cx="58" cy="56" r="8" fill="#e15d4f"/>
  <circle cx="86" cy="56" r="8" fill="#e5bb4f"/>
  <circle cx="114" cy="56" r="8" fill="#4fb26d"/>
  <text x="560" y="62" text-anchor="middle" fill="#a9bdb2" font-family="Arial, sans-serif" font-size="18">4d4y_cli</text>
  <g font-family="Consolas, 'Liberation Mono', monospace" font-size="24">
    <text x="78" y="118" fill="#63d6b0">################################################################################</text>
    <text x="560" y="164" text-anchor="middle" fill="#eef7ef" font-weight="700">4D4Y Forum CLI 客户端</text>
    <text x="560" y="202" text-anchor="middle" fill="#eef7ef">仿 BBS 风格的终端论坛浏览工具</text>
    <text x="560" y="242" text-anchor="middle" fill="#91a79b" font-size="20">版本 1.0.2 | 访问 https://www.4d4y.com/forum/</text>
    <text x="78" y="294" fill="#63d6b0">────────────────────────────────────────────────────────────────────────────────</text>
    <text x="560" y="334" text-anchor="middle" fill="#eef7ef" font-weight="700">================================== 4D4Y Forum ==================================</text>
    <text x="78" y="374" fill="#63d6b0">────────────────────────────────────────────────────────────────────────────────</text>
    <text x="98" y="420" fill="#ff746e">未登录</text>
    <text x="98" y="466" fill="#63d6b0">[1]</text>
    <text x="164" y="466" fill="#eef7ef">浏览论坛板块</text>
    <text x="98" y="506" fill="#63d6b0">[2]</text>
    <text x="164" y="506" fill="#eef7ef">进入 Discovery 板块</text>
    <text x="98" y="546" fill="#63d6b0">[L]</text>
    <text x="164" y="546" fill="#eef7ef">登录</text>
    <text x="98" y="586" fill="#63d6b0">[Q]</text>
    <text x="164" y="586" fill="#eef7ef">退出</text>
  </g>
</svg>
